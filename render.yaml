services:
  - type: web
    name: airtable-dashboard
    env: node
    plan: free
    buildCommand: cd ../.. && bun install && cd packages/client && rm -rf .next && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: BETTER_AUTH_SECRET
        sync: false  # Set in Render dashboard (same value as NEXTAUTH_SECRET)
      - key: BETTER_AUTH_URL
        value: https://app.vault1040.com
      - key: DATABASE_URL
        sync: false  # Set in Render dashboard - PostgreSQL connection string
      - key: NEXTAUTH_SECRET
        sync: false  # Still needed — signs JWTs for Hono server bridge
      - key: NEXT_PUBLIC_API_URL
        value: https://vault-api.onrender.com
      - key: HONO_API_URL
        sync: false
      - key: API_SECRET_KEY
        sync: false
